# Deploy — Despliegue automático a GitHub Pages
#
# Se ejecuta cada vez que se hace push (o merge de PR) a la rama `main`.
# Compila el frontend y lo publica en GitHub Pages automáticamente.
#
# URL resultante: https://cristianalonsor.github.io/portafolio/
#
# Requiere configuración en GitHub una sola vez:
#   Settings → Pages → Source → GitHub Actions

name: Deploy to GitHub Pages

# ── Disparador ──────────────────────────────────────────────────────────────
# Solo se activa en pushes directos a `main` (incluye merges de PRs).
# No se activa en PRs — para eso existe ci.yml.
on:
  push:
    branches: [main]
  # Permite disparar el deploy manualmente desde la pestaña Actions en GitHub.
  # Útil para re-deployar sin necesidad de hacer un commit.
  workflow_dispatch:

# ── Permisos ─────────────────────────────────────────────────────────────────
# GitHub Pages con GitHub Actions requiere estos permisos especiales.
# `pages: write`    → permite publicar en GitHub Pages
# `id-token: write` → permite autenticación OIDC (identidad del workflow)
# `contents: read`  → permite leer el código del repo
permissions:
  contents: read
  pages: write
  id-token: write

# ── Concurrencia ─────────────────────────────────────────────────────────────
# Evita que dos deploys corran al mismo tiempo para la misma rama.
# Si ya hay un deploy en curso y llega otro push, cancela el anterior
# y corre el más nuevo (`cancel-in-progress: true`).
concurrency:
  group: pages
  cancel-in-progress: true

# ── Jobs ─────────────────────────────────────────────────────────────────────
# Este workflow tiene tres jobs en secuencia: build → deploy → verify.
# Cada job espera al anterior con `needs`.
jobs:

  # ── Job 1: Compilar ────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:

      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Instalar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      # `npm run build` ejecuta `tsc -b && vite build` (definido en package.json).
      # VITE_BASE_PATH=/portafolio/ → la app sabrá que vive en ese subdirectorio.
      # Sin esto, los assets (JS, CSS) se buscarían en / y no cargarían en Pages.
      - name: Compilar para producción
        run: npm run build
        env:
          VITE_BASE_PATH: /portafolio/
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      # Empaqueta la carpeta `frontend/dist` como un artefacto de Pages.
      # Un "artefacto" es un archivo temporal que GitHub Actions puede pasar
      # entre jobs — aquí lo usamos para pasar el build compilado al job de deploy.
      - name: Empaquetar artefacto para Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  # ── Job 2: Desplegar ──────────────────────────────────────────────────────
  deploy:
    # Este job no empieza hasta que `build` termine exitosamente.
    needs: build
    runs-on: ubuntu-latest

    # `environment` conecta este job con el ambiente "github-pages" de GitHub.
    # La URL del deployment aparece en el PR y en el panel de Environments.
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # Toma el artefacto que subió el job `build` y lo publica en GitHub Pages.
      # Este action es oficial de GitHub — es la forma recomendada de desplegar.
      - name: Publicar en GitHub Pages
        uses: actions/deploy-pages@v4
        id: deployment

  # ── Job 3: Verificar ──────────────────────────────────────────────────────
  # Smoke test post-deploy: verifica que el sitio responde HTTP 200.
  # Si el build compiló pero el deploy falló silenciosamente (token expirado,
  # artefacto corrupto, fallo de Pages), este job lo detecta y queda en rojo.
  verify:
    name: Verificar GitHub Pages
    needs: deploy
    runs-on: ubuntu-latest

    steps:
      # Espera hasta 3 minutos (6 intentos × 30s) para que Pages propague el deploy.
      # Pages puede tardar hasta 2 minutos en servir el nuevo contenido.
      - name: Smoke test — verificar que el sitio responde
        run: |
          for i in $(seq 1 6); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://cristianalonsor.github.io/portafolio/)
            if [ "$STATUS" = "200" ]; then
              echo "Sitio disponible (HTTP $STATUS) en el intento $i"
              exit 0
            fi
            echo "Intento $i: HTTP $STATUS — esperando 30s para que Pages propague..."
            sleep 30
          done
          echo "El sitio no respondió HTTP 200 después de 3 minutos"
          exit 1
