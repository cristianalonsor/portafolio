# CI — Integración Continua
#
# Este workflow actúa como "gate" (puerta de calidad) antes de mergear un PR.
# Se ejecuta automáticamente cada vez que alguien abre o actualiza un Pull Request
# hacia las ramas `main` o `docs`.
#
# Objetivo: garantizar que ningún código roto entre a las ramas principales.
# Si alguno de estos jobs falla, GitHub bloquea el merge del PR.
#
# Jobs:
#   check-frontend → TypeScript + ESLint + build del frontend
#   check-backend  → TypeScript + build del backend (corre en paralelo)

name: CI

on:
  pull_request:
    branches: [main, docs]

# Permisos mínimos — solo necesitamos leer el código
permissions:
  contents: read

jobs:

  # ── Frontend ──────────────────────────────────────────────────────────────
  check-frontend:
    name: Frontend — TypeScript + Lint + Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:

      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Instalar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # `npm ci` instala las dependencias exactas del package-lock.json.
      # Es determinista y falla si el lockfile no coincide — garantiza reproducibilidad.
      - name: Instalar dependencias
        run: npm ci

      # Verifica que no haya errores de TypeScript.
      # `--noEmit` → solo chequea tipos, no genera archivos .js.
      - name: Verificar TypeScript
        run: npx tsc --noEmit

      # ESLint detecta problemas que TypeScript no atrapa:
      # hooks llamados condicionalmente, dependencias faltantes en useEffect, etc.
      - name: ESLint
        run: npm run lint

      # Compilación completa como si fuera a producción.
      # Detecta imports rotos y assets faltantes que TypeScript no atrapa.
      - name: Compilar para producción
        run: npm run build
        env:
          VITE_BASE_PATH: /portafolio/
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

  # ── Backend ───────────────────────────────────────────────────────────────
  # Corre en paralelo con check-frontend — son independientes.
  # Un backend roto no debe llegar a producción sin detectarse en CI.
  check-backend:
    name: Backend — TypeScript + Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:

      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Instalar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      # `npm run build` ejecuta `tsc` en el backend.
      # Verifica tipos y genera el output en dist/ — detecta errores de compilación.
      - name: Compilar TypeScript
        run: npm run build
