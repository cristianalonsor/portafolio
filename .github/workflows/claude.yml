# Claude GitHub Action — Integración de Claude Code en el repositorio
#
# Permite mencionar @claude en cualquier comentario de issue o PR para que
# Claude Code analice el repositorio, escriba código y abra PRs automáticamente.
#
# Casos de uso:
#   - "@claude implementa X en el componente Y"
#   - "@claude revisa este PR y dime si hay problemas"
#   - "@claude hay un bug en el formulario de contacto, corrígelo"
#   - "@claude añade tests para el middleware de validación"
#
# Requisitos (configurar una sola vez en GitHub):
#   1. Instalar la GitHub App: https://github.com/apps/claude
#   2. Añadir secret ANTHROPIC_API_KEY en Settings → Secrets → Actions

name: Claude Code

on:
  # Se dispara cuando alguien comenta en un issue
  issue_comment:
    types: [created]

  # Se dispara cuando alguien comenta en una línea específica de un PR
  pull_request_review_comment:
    types: [created]

  # Se dispara cuando alguien deja un review general en un PR
  pull_request_review:
    types: [submitted]

# Permisos necesarios para que Claude pueda leer el repo,
# escribir comentarios y crear/actualizar PRs
permissions:
  contents: write        # leer y escribir archivos del repo
  pull-requests: write   # abrir y comentar en PRs
  issues: write          # comentar en issues
  id-token: write        # autenticación OIDC

jobs:
  claude:
    # Solo corre si el comentario contiene "@claude"
    # Evita que el workflow se dispare en cada comentario del repo
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude'))

    runs-on: ubuntu-latest

    steps:
      - name: Ejecutar Claude Code
        uses: anthropics/claude-code-action@beta
        with:
          # API key de Anthropic — nunca escribirla directamente aquí,
          # siempre desde secrets para que no quede expuesta en los logs
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          # Contexto adicional que Claude recibe en cada tarea.
          # Le explica la estructura del proyecto para que tome mejores decisiones.
          custom_instructions: |
            Este es el portafolio personal de Cristian Reyes — Full Stack Developer.
            Repositorio: https://github.com/cristianalonsor/portafolio

            ## Estructura del monorepo

            ### Frontend (frontend/)
            React 19 + TypeScript + Vite + Tailwind CSS v4.
            Scripts: dev / build / lint / preview

            Archivos clave:
            - frontend/src/components/  → layout/ (Navbar, Footer), sections/ (Hero, About, Skills, Projects, Contact), ui/ (Button, Badge)
            - frontend/src/pages/       → Home.tsx (scroll único), ProjectDetail.tsx (detalle /proyectos/:slug)
            - frontend/src/data/        → projects.ts, skills.ts — arrays estáticos (SIN base de datos)
            - frontend/src/hooks/       → useContactForm.ts (lógica del formulario)
            - frontend/src/types/       → index.ts (interfaces Project, SkillCategory, etc.)
            - frontend/src/index.css    → Sistema de colores con directiva @theme de Tailwind v4

            Sistema de diseño (clases Tailwind disponibles):
            - coral (#E63946) · teal (#2A9D8F) · orange (#F4A261) · yellow (#E9C46A)
            - dark (#1a1a2e) · slate (#264653) · muted (#A8A8B3)
            - Tipografías: font-grotesk (Space Grotesk, headings) · font-inter (Inter, body)
            - NUNCA usar HEX hardcodeados en componentes — siempre clases Tailwind (bg-coral, text-teal, etc.)

            TypeScript frontend: verbatimModuleSyntax ACTIVO → SIEMPRE usar `import type` para tipos.
            Sin `import type`, TypeScript lanza error en compilación.

            ### Backend (backend/)
            Node.js + Express 5 + TypeScript + Resend API.
            Scripts: dev / build / start

            Archivos clave:
            - backend/src/index.ts                          → Entry point, configura Express y monta rutas
            - backend/src/routes/contact.route.ts           → POST /api/contact
            - backend/src/middlewares/validate.middleware.ts → Validación del body del formulario
            - backend/src/services/mailer.service.ts        → Integración Resend para envío de emails
            - backend/src/types/contact.types.ts            → Interfaces ContactPayload y ApiResponse

            Endpoints:
            - POST /api/contact → recibe { name, email, subject, message }, valida y envía email
            - GET /health → { status: 'ok' } (health check para Railway)

            TypeScript backend: CommonJS con esModuleInterop — NO requiere `import type`.
            Variables de entorno: RESEND_API_KEY, FROM_EMAIL, TO_EMAIL, FRONTEND_URL, PORT
            (ver backend/.env.example para referencia)

            ## Reglas de código

            - `import type` OBLIGATORIO para tipos en el frontend (verbatimModuleSyntax)
            - JSDoc en todas las funciones y componentes nuevos o modificados
            - Mobile-first: estilos base para móvil, breakpoints sm/md/lg añaden encima
            - Datos estáticos en frontend/src/data/ — NO crear base de datos ni fetch externo
            - Variables de entorno en process.env, nunca hardcodeadas
            - Si añades vars de entorno al backend, actualiza backend/.env.example
            - Conventional commits: feat/fix/refactor/style/docs
            - PRs siempre de una rama feature hacia main — nunca push directo a main

            ## Infraestructura

            - Frontend: GitHub Pages — https://cristianalonsor.github.io/portafolio/
            - Backend: Railway (auto-deploy cuando hay cambios en backend/ en main)
            - CI gate: TypeScript + ESLint (frontend) y TypeScript (backend) en cada PR
