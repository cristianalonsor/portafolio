# opencode.yml — Workflow de GitHub Actions que AUTOMATIZA el ciclo completo:
#
#   Label 'autoimplement' en issue → opencode lo lee → implementa código → crea Pull Request
#
# ¿Cómo funciona?
# ────────────────
# 1. Cuando aplicas el label 'autoimplement' a un issue, este workflow se activa.
# 2. Comenta en el issue que la implementación comenzó.
# 3. Instala opencode (CLI de IA) en el runner de GitHub Actions.
# 4. Ejecuta `opencode run` en modo no interactivo con un prompt que le indica:
#    a. Leer el issue con `gh issue view`
#    b. Analizar el código del repositorio (ya clonado)
#    c. Crear una rama con el formato feat/issue-{numero}-{slug}
#    d. Implementar los cambios necesarios
#    e. Hacer commit y push
#    f. Crear un Pull Request con `gh pr create`
# 5. Comenta en el issue el resultado (éxito con link al PR, o fallo con link a los logs).
# 6. Tú solo revisas el PR y lo mergeas si está correcto.
#
# ¿Por qué el label 'autoimplement' en vez de dispararse en cualquier issue?
# ─────────────────────────────────────────────────────────────────────────
# No todos los issues son implementables automáticamente. Los de discusión,
# bugs complejos o epics requieren análisis humano. El label actúa como
# una confirmación explícita de que quieres automatización.
#
# ¿Por qué opencode y no Claude Code?
# ─────────────────────────────────────
# opencode tiene modelos gratuitos integrados (opencode/deepseek-v4-flash-free)
# que NO requieren API key de terceros. El costo por ejecución es $0.

name: opencode Auto-Implement

# ── Disparadores ──────────────────────────────────────────────────────────────
# Se activa cuando se abre un issue (por si ya tiene el label) O cuando
# se aplica un label. La condición del job filtra por 'autoimplement'.
on:
  issues:
    types: [labeled]

# ── Permisos ──────────────────────────────────────────────────────────────────
# contents: write      → necesario para pushear ramas nuevas
# pull-requests: write → necesario para crear PRs
# issues: write        → necesario para comentar en el issue (feedback al usuario)
permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  # ── Job: implement ─────────────────────────────────────────────────────────
  implement:
    # Solo ejecuta cuando se aplica el label 'autoimplement' a un issue abierto.
    # github.event.label.name → el label específico que acaba de aplicarse.
    # Esto es más confiable que toJson() que serializa con espacios ("name": "value")
    # y hace que contains() nunca encuentre "name":"value" (sin espacio).
    if: github.event.issue.state == 'open' && github.event.label.name == 'autoimplement'

    runs-on: ubuntu-latest

    # Timeout de 15 minutos — si opencode tarda más, probablemente está en un loop.
    timeout-minutes: 15

    steps:
      # 0. Notificar al usuario que la implementación comenzó.
      # Este step corre ANTES del checkout para que el feedback sea inmediato.
      - name: Comentar inicio en el issue
        run: |
          gh issue comment ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --body "🤖 **opencode** ha iniciado la implementación automática de este issue. Se creará un Pull Request cuando termine."
        env:
          GH_TOKEN: ${{ secrets.GH_PATH }}

      # 1. Clonar el repositorio en el runner
      # fetch-depth: 0 → clona todo el historial (necesario para crear ramas)
      - name: Checkout del repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Configurar git para que los commits tengan autoría correcta
      - name: Configurar git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # 3. Instalar xsel (proporciona API de clipboard en headless Linux)
      # Bun (runtime de opencode) intenta leer el portapapeles al iniciar.
      # En GitHub Actions no hay X11/Wayland, entonces Bun puede crashear.
      # xsel provee una implementación de clipboard que no crashea en headless.
      - name: Instalar dependencias de clipboard
        run: sudo apt-get update -qq && sudo apt-get install -y -qq xsel >/dev/null 2>&1 || true

      # 4. Autenticar gh CLI con el PAT
      #
      # opencode SANITIZA las variables GH_TOKEN y GITHUB_TOKEN por seguridad
      # (las borra antes de ejecutar subprocesos). Por eso, aunque el workflow
      # tenga GH_TOKEN en env, gh CLI no puede usarlo dentro de opencode.
      #
      # Por qué NO usamos `gh auth login --with-token`:
      #   gh auth login valida el token y exige el scope 'read:org'.
      #   Si el PAT no tiene ese scope (no es necesario para crear PRs), falla.
      #
      # Solución: escribir el token directamente en ~/.config/gh/hosts.yml.
      #   gh CLI lee este archivo sin hacer validación de scopes.
      #   Solo necesita el scope 'repo' para crear ramas y PRs.
      - name: Autenticar gh CLI
        run: |
          mkdir -p ~/.config/gh
          cat > ~/.config/gh/hosts.yml << EOF
          github.com:
              oauth_token: ${{ secrets.GH_PATH }}
              git_protocol: https
          EOF

      # 5. Instalar opencode globalmente con npm
      # El paquete oficial es "opencode-ai" (no @opencode-ai/cli).
      - name: Instalar opencode
        run: npm install -g opencode-ai

      # 6. Escribir el prompt a un archivo temporal
      #
      # Usamos un archivo en vez de pasar el prompt como argumento CLI por:
      #   a) Evitar problemas de escaping en GitHub Actions
      #   b) Mantener el prompt legible y editable
      - name: Escribir prompt
        run: |
          cat > /tmp/prompt.md << PROMPT_EOF
          Eres un desarrollador automatizado en GitHub Actions.

          Te han asignado el issue #${{ github.event.issue.number }} de este repositorio.

          ## Paso 1: Leer el issue
          Ejecuta: gh issue view ${{ github.event.issue.number }} --json title,body,labels
          Analiza el título, descripción y labels para entender qué hay que hacer.

          ## Paso 2: Crear una rama
          Crea una rama desde main con el formato: feat/issue-${{ github.event.issue.number }}-{slug}
          donde slug son 2-3 palabras del título en inglés, separadas por guiones.
          Ejecuta:
            git checkout main
            git pull origin main
            git checkout -b feat/issue-${{ github.event.issue.number }}-{slug}

          ## Paso 3: Implementar
          Lee los archivos relevantes del proyecto (usa cat o read de archivo).
          Entiende la estructura del monorepo:
            - frontend/ → React + TypeScript + Vite + Tailwind CSS v4
            - backend/ → Express + TypeScript + Resend API

          Implementa los cambios siguiendo estas reglas del proyecto:
            Frontend:
              - verbatimModuleSyntax activo → SIEMPRE usar `import type` para tipos
              - Sistema de colores: clases Tailwind bg-coral, text-teal, etc. (nunca HEX hardcodeados)
              - Datos estáticos en frontend/src/data/ — NO hay base de datos
              - Tipografías: font-grotesk (headings), font-inter (body)
            Backend:
              - CommonJS con esModuleInterop — NO requiere import type
              - Variables de entorno en process.env, nunca hardcodeadas
              - Si añades vars de entorno, actualiza backend/.env.example

          Verifica antes de continuar:
            Si cambiaste frontend/:
              cd frontend && npx tsc --noEmit && npm run lint && npm run build && cd ..
            Si cambiaste backend/:
              cd backend && npm run build && cd ..

          ## Paso 4: Commit y push
          Ejecuta:
            git add -A
            git commit -m 'feat: implementa issue #${{ github.event.issue.number }} - {titulo}'
            git push origin feat/issue-${{ github.event.issue.number }}-{slug}

          ## Paso 5: Crear Pull Request
          Ejecuta:
            gh pr create \
              --title 'Implementa issue #${{ github.event.issue.number }}: {titulo}' \
              --body 'Closes #${{ github.event.issue.number }}

          ## Cambios realizados
          - {lista de cambios}

          > PR generado automáticamente por opencode' \
              --base main

          ## Reglas importantes
          - No modifiques archivos que no estén relacionados con el issue
          - Sigue las convenciones del proyecto
          - Si algo no está claro, haz tu mejor interpretación
          - NO esperes confirmación del usuario — ejecuta directamente
          - El repositorio ya está clonado en el directorio actual
          PROMPT_EOF

      # 7. Ejecutar opencode en modo NO INTERACTIVO
      #
      # opencode run: ejecuta opencode con un mensaje y termina.
      #
      # Flags:
      #   --dangerously-skip-permissions → auto-aprueba todas las herramientas
      #   -m opencode/deepseek-v4-flash-free → modelo gratuito sin API key
      #   --log-level ERROR → suprime logs internos
      #
      # Por qué </dev/null: Bun intenta leer el portapapeles si detecta un TTY.
      # Redirigir stdin desde /dev/null fuerza a Bun a no usar features interactivas.
      #
      # Env vars:
      #   OPENCODE_DISABLE_PROJECT_CONFIG: "1" → evita que cargue opencode.jsonc del repo
      #   CI: "true" → indica a opencode que se ejecuta en CI/CD
      #   TERM: dumb → evita que opencode active features de terminal
      - name: Implementar issue con opencode
        env:
          OPENCODE_DISABLE_PROJECT_CONFIG: "1"
          CI: "true"
          TERM: dumb
        run: |
          opencode run \
            --dangerously-skip-permissions \
            -m opencode/deepseek-v4-flash-free \
            --log-level ERROR \
            "$(cat /tmp/prompt.md)" </dev/null

      # 8. Reportar resultado al issue
      # if: always() → corre aunque el step anterior haya fallado.
      # Esto garantiza que el usuario siempre recibe feedback.
      - name: Reportar resultado en el issue
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            gh issue comment ${{ github.event.issue.number }} \
              --repo ${{ github.repository }} \
              --body "✅ **opencode** terminó. Revisa el Pull Request creado para este issue."
          else
            gh issue comment ${{ github.event.issue.number }} \
              --repo ${{ github.repository }} \
              --body "❌ **opencode** encontró un error durante la implementación. Revisa los logs del workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
        env:
          GH_TOKEN: ${{ secrets.GH_PATH }}
