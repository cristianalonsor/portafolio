<!doctype html>
<!--
  404.html — Fallback de rutas SPA para GitHub Pages.

  Problema: GitHub Pages es un servidor de archivos estáticos.
  Si el usuario navega directamente a /portafolio/proyectos/mi-proyecto
  o refresca el browser en esa URL, GitHub Pages busca el archivo
  portafolio/proyectos/mi-proyecto/index.html — que no existe — y devuelve 404.

  Solución: GitHub Pages sirve ESTE archivo cuando no encuentra la ruta.
  Este script codifica la ruta en el query string y redirige a index.html,
  donde otro script (en index.html) la restaura antes de que React Router inicie.

  Técnica conocida como "spa-github-pages" (rafgraph/spa-github-pages).
-->
<html lang="es">
  <head>
    <meta charset="utf-8">
    <title>Cristian Reyes — Full Stack Developer</title>
    <script>
      // window.location.pathname en GitHub Pages incluye el prefijo del repo:
      //   /portafolio/proyectos/mi-proyecto
      //
      // .split('/').slice(0, 2).join('/') → extrae solo '/portafolio'
      // El resto de la ruta se codifica como query string: ?/proyectos/mi-proyecto
      // Así index.html puede leerlo y reconstruir la ruta real.
      //
      // &/g → '~and~' para no confundir con los & de los query params reales.
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 2).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(1).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
