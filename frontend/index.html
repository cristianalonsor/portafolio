    <!--
      Script de restauración de ruta SPA (complemento de public/404.html).

      Cuando GitHub Pages no encuentra una ruta y sirve 404.html, ese archivo
      redirige aquí con la ruta codificada en el query string: /?/proyectos/slug

      Este script detecta ese patrón (search[1] === '/'), decodifica la ruta
      y llama a window.history.replaceState para restaurar la URL original
      ANTES de que React se monte y React Router lea window.location.pathname.

      Resultado: el usuario ve la URL correcta y React Router renderiza la vista
      correspondiente como si nunca hubiera habido un 404.
    -->
    <script>
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location));
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
